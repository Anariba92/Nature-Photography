<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotografías de la naturaleza | Mi Portafolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .photo-card:hover img { transform: scale(1.05); transition: 0.3s; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800">

    <header class="py-12 px-6 text-center">
        <h1 class="text-4xl font-serif font-bold text-green-900">Exploraciones Naturales</h1>
        <p class="mt-2 text-stone-500 italic">Capturando la biodiversidad a través de mi lente.</p>
        <div class="h-1 w-20 bg-green-600 mx-auto mt-4"></div>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="photo-card bg-white rounded-lg overflow-hidden shadow-sm border border-stone-200">
                <img src="https://images.unsplash.com/photo-1543946207-39bd91e70ca7" alt="Ave en el bosque" class="w-full h-64 object-cover">
                <div class="p-4">
                    <span class="text-xs font-bold text-green-600 uppercase">Aves</span>
                    <h3 class="text-lg font-bold">Colibrí Garganta Rubí</h3>
                    <p class="text-sm text-stone-600">Avistado en el jardín botánico. Marzo 2026.</p>
                </div>
            </div>

            <div class="photo-card bg-white rounded-lg overflow-hidden shadow-sm border border-stone-200">
                <img src="img/Pino.jpg" alt="Pino de la imagen" class="w-full h-64 object-cover shadow-lg rounded-lg">
                <div class="p-4">
                    <span class="text-xs font-bold text-green-600 uppercase">Abraza un árbol</span>
                    <h3 class="text-lg font-bold">Vista</h3>
                    <p class="text-sm text-stone-600">Árbol de liquidámbar.</p>
                </div>
            </div>

            <div class="photo-card bg-white rounded-lg overflow-hidden shadow-sm border border-stone-200">
                <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b" alt="Bosque" class="w-full h-64 object-cover">
                <div class="p-4">
                    <span class="text-xs font-bold text-green-600 uppercase">Flora</span>
                    <h3 class="text-lg font-bold">Helecho Real</h3>
                    <p class="text-sm text-stone-600">Detalle de las esporas en zona húmeda.</p>
                </div>
            </div>

        </div>
    </main>

    <footer class="py-8 bg-stone-100 text-center border-t border-stone-200">
        <p class="text-stone-400 text-sm">© 2026 - Mi Diario de Naturaleza</p>
    </footer>

</body>
</html>
