<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum: Árboles | Bosques</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Zoom suave al pasar el mouse sobre la tarjeta */
        .photo-card:hover .img-container img { transform: scale(1.1); }
        .flipped .inner-card { transform: rotateY(180deg); }
        .img-container { overflow: hidden; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800">

    <nav class="p-6 max-w-6xl mx-auto">
        <a href="index.html" class="inline-flex items-center text-green-800 font-bold hover:text-green-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Volver al Inicio
        </a>
    </nav>

    <header class="py-10 px-6 text-center">
        <h1 class="text-4xl font-serif font-bold text-green-900">Colección: Bosques</h1>
        <p class="mt-2 text-stone-500 italic">Majestuosos gigantes de nuestra tierra.</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="photo-card bg-white rounded-lg overflow-hidden shadow-sm border border-stone-200">
                <div class="relative w-full h-80 cursor-pointer group" onclick="this.classList.toggle('flipped')">
                    <div class="inner-card relative w-full h-full duration-500 [transform-style:preserve-3d]">
                        <div class="absolute inset-0 w-full h-full [backface-visibility:hidden] img-container">
                            <img src="img/Pino.jpg" alt="Detalle Liquidámbar" class="w-full h-full object-cover scale-125 object-top transition-transform duration-500">
                            <button type="button" onclick="event.stopPropagation(); openImage('img/Pino.jpg')" class="absolute top-3 right-3 bg-black/60 text-white p-2 rounded-full z-10 hover:bg-green-600 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
                                </svg>
                            </button>
                            <div class="absolute bottom-4 left-4 bg-black/50 text-white px-3 py-1 rounded-full text-xs">Info ↺</div>
                        </div>
                        <div class="absolute inset-0 w-full h-full bg-green-900 text-white p-6 [transform:rotateY(180deg)] [backface-visibility:hidden] flex flex-col justify-center items-center text-center">
                            <h3 class="text-xl font-bold mb-2 italic">Liquidámbar Styraciflua</h3>
                            <p class="text-sm">Árbol caducifolio famoso por sus hojas estrelladas que tornan a colores intensos en otoño.</p>
                        </div>
                    </div>
                </div>
                <div class="p-4"><h3 class="font-bold text-green-800">Nombre común: Liquidámbar</h3></div>
            </div>

            <div class="photo-card bg-white rounded-lg overflow-hidden shadow-sm border border-stone-200">
                <div class="relative w-full h-80 cursor-pointer group" onclick="this.classList.toggle('flipped')">
                    <div class="inner-card relative w-full h-full duration-500 [transform-style:preserve-3d]">
                        <div class="absolute inset-0 w-full h-full [backface-visibility:hidden] img-container">
                            <img src="img/bosque.jpg" alt="Detalle Pino" class="w-full h-full object-cover scale-150 object-center transition-transform duration-500">
                            <button type="button" onclick="event.stopPropagation(); openImage('img/bosque.jpg')" class="absolute top-3 right-3 bg-black/60 text-white p-2 rounded-full z-10 hover:bg-green-600 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill
