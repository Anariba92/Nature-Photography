<div id="imageModal" class="fixed inset-0 bg-black/95 z-[9999] hidden items-center justify-center" onclick="closeModalDirect(event)">
    <button onclick="closeModalForce()" class="absolute top-5 right-10 text-white text-6xl hover:text-green-500 z-[10000]">&times;</button>
    
    <button id="prevBtn" onclick="changeLightboxImg(-1, event)" class="absolute left-5 top-1/2 -translate-y-1/2 bg-white/10 hover:bg-green-600 text-white p-5 rounded-full z-[10000] text-3xl transition-all">
        &#10094;
    </button>

    <img id="fullImage" src="" class="max-w-[85%] max-h-[80%] rounded-lg shadow-2xl transition-transform duration-300" onclick="event.stopPropagation()">

    <button id="nextBtn" onclick="changeLightboxImg(1, event)" class="absolute right-5 top-1/2 -translate-y-1/2 bg-white/10 hover:bg-green-600 text-white p-5 rounded-full z-[10000] text-3xl transition-all">
        &#10095;
    </button>
    
    <p class="absolute bottom-10 text-white/40 text-sm">Usa las flechas o ESC para salir</p>
</div>
