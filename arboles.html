<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum: Bosques | Versión Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Contenedor de imagen con altura fija para efecto "recorte" */
        .img-container { 
            height: 380px; 
            overflow: hidden; 
            position: relative; 
            background: #1a1a1a; 
        }
        
        /* Imagen en el cuadro: Se ve recortada (cover) */
        .preview-img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; transition: opacity 0.4s ease;
        }

        /* Efecto Flip de la tarjeta */
        .inner-card { transition: transform 0.6s; transform-style: preserve-3d; position: relative; width: 100%; height: 380px; }
        .flipped .inner-card { transform: rotateY(180deg); }
        .back-card { transform: rotateY(180deg); backface-visibility: hidden; position: absolute; inset: 0; border-radius: 1rem; }
        .front-card { backface-visibility: hidden; position: absolute; inset: 0; border-radius: 1rem; }

        /* Modal / Lightbox (Pantalla Completa) */
        #imageModal {
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.98); z-index: 9999; 
            align-items: center; justify-content: center;
        }
        /* Imagen en modo completo: Se ve TODA la imagen (contain) */
        #fullImage { 
            max-width: 90%; max-height: 85vh; 
            object-fit: contain; border-radius: 4px;
        }

        /* Botones de Navegación */
        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.5); color: white; padding: 12px 16px;
            border-radius: 50%; cursor: pointer; z-index: 60; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .nav-arrow:hover { background: #16a34a; transform: translateY(-50%) scale(1.1); }
        
        /* Ocultar elementos de navegación si solo hay una imagen */
        .only-one .nav-arrow, .only-one .dots-container { display: none !important; }
    </style>
</head>
