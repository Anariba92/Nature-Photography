<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Bosques | Árboles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* 1. VISTA EN TARJETA (Imagen recortada/zoom) */
        .img-container { 
            height: 380px; 
            overflow: hidden; 
            position: relative; 
            background: #1a1a1a; 
            border-radius: 1rem 1rem 0 0; 
        }
        
        .preview-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            position: absolute; 
            transition: transform 0.5s ease; 
            /* Este scale hace que solo se vea una parte en la tarjeta */
            transform: scale(1.8); 
            opacity: 0;
        }
        .preview-img.active { opacity: 1; }
        
        /* 2. EFECTO 3D */
        .photo-card { perspective: 1000px; height: 480px; }
        .inner-card { transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
        .flipped .inner-card { transform: rotateY(180deg); }
        .front-card, .back-card { backface-visibility: hidden; position: absolute; inset: 0; border-radius: 1rem; overflow: hidden; }
        .back-card { transform: rotateY(180deg); background: #064e3b; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
        
        /* 3. VISTA EN MODAL (Imagen completa) */
        #imageModal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.98); 
            z-index: 9999; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column; 
            padding: 20px;
        }
        
        #fullImage { 
            max-width: 90%; 
            max-height: 75vh; 
            /* Contain asegura que se vea TODA la foto sin recortes */
            object-fit: contain; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: zoom-in;
            /* Quitamos el zoom del preview */
            transform: scale(1);
        }
        
        /* Zoom extra al hacer clic dentro del modal */
        #fullImage.zoomed { transform: scale(1.6); cursor: zoom-out; }
        
        .hidden-card { display: none !important; }
        #filterCount { transition: opacity 0.3s ease; opacity: 0; pointer-events: none; }
        #filterCount.show { opacity: 1; }

        body { padding-top: 12rem; }
        @media (min-width: 768px) { body { padding-top: 9rem; } }
    </style>
</head>
<body class="bg-stone-100 p-4">

    <nav class="fixed top-0 left-0 w-full bg-white/80 backdrop-blur-xl border-b z-[100] p-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="bg-green-900 text-white px-5 py-2 rounded-full font-bold text-sm shadow-md">❮ MENÚ</a>
                <div id="filterCount" class="text-xs font-bold text-stone-500 bg-stone-200 px-3 py-1 rounded-full uppercase">Actualizando...</div>
            </div>
            <div class="flex flex-wrap gap-2 w-full md:w-auto">
                <input type="text" id="searchInput" oninput="filtrarContenido()" placeholder="Buscar especie..." class="flex-1 md:w-64 px-4 py-2 rounded-xl border border-stone-300 outline-none focus:ring-2 focus:ring-green-600">
                <select id="yearFilter" onchange="filtrarContenido()" class="px-4 py-2 rounded-xl border border-stone-300 bg-white">
                    <option value="all">Todos los años</option>
                    <option value="2026">2026</option>
                </select>
            </div>
        </div>
    </nav>

    <main id="albumGrid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        
        <div class="photo-card" data-name="liquidambar" data-year="2026">
            <div class="relative h-full cursor-pointer" onclick="handleFlip(this, event)">
                <div class="inner-card">
                    <div class="front-card bg-white shadow-lg">
                        <div class="img-container">
                            <img src="img/Pino.jpg" class="preview-img active">
                            <button onclick="openModal(this, event)" class="absolute top-3 right-3 bg-green-600 text-white p-3 rounded-full z-20 shadow-xl hover:scale-110 transition-transform">🔍 Ver Completa</button>
                        </div>
                        <div class="p-5 text-center">
                            <h3 class="font-bold text-green-900 uppercase text-sm">Liquidámbar</h3>
                        </div>
                    </div>
                    <div class="back-card">
                        <p class="italic text-lg">"Hojas en forma de estrella de los bosques templados."</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="photo-card" data-name="san juancito montaña" data-year="2026">
            <div class="relative h-full cursor-pointer" onclick="handleFlip(this, event)">
                <div class="inner-card">
                    <div class="front-card bg-white shadow-lg">
                        <div class="img-container">
                            <img src="img/montaña.jpg" class="preview-img active">
                            <button onclick="openModal(this, event)" class="absolute top-3 right-3 bg-green-600 text-white p-3 rounded-full z-20 shadow-xl hover:scale-110 transition-transform">🔍 Ver Completa</button>
                        </div>
                        <div class="p-5 text-center">
                            <h3 class="font-bold text-green-900 uppercase text-sm">San Juancito</h3>
                        </div>
                    </div>
                    <div class="back-card">
                        <p class="italic text-lg">"Reserva histórica y forestal de Honduras."</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="photo-card" data-name="bosque pinos" data-year="2026">
            <div class="relative h-full cursor-pointer" onclick="handleFlip(this, event)">
                <div class="inner-card">
                    <div class="front-card bg-white shadow-lg">
                        <div class="img-container">
                            <img src="img/hoja.jpg" class="preview-img active">
                            <button onclick="openModal(this, event)" class="absolute top-3 right-3 bg-green-600 text-white p-3 rounded-full z-20 shadow-xl hover:scale-110 transition-transform">🔍 Ver Completa</button>
                        </div>
                        <div class="p-5 text-center">
                            <h3 class="font-bold text-green-900 uppercase text-sm">Bosque de Pinos</h3>
                        </div>
                    </div>
                    <div class="back-card">
                        <p class="italic text-lg">"Detalle de la flora autóctona."</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div id="imageModal" onclick="closeModal()">
        <span class="absolute top-5 right-10 text-white text-5xl cursor-pointer hover:text-green-400">&times;</span>
        <div class="flex flex-col items-center justify-center w-full h-full">
            <p class="text-white text-xs mb-4 opacity-60">Foto Completa - Haz clic para ampliar</p>
            <div class="overflow-hidden flex items-center justify-center">
                <img id="fullImage" src="" onclick="toggleZoom(event)">
            </div>
            <button onclick="askDonation(event)" class="mt-8 bg-green-600 hover:bg-green-500 text-white px-10 py-3 rounded-full font-bold shadow-2xl transition-all">📥 Descargar Fotografía</button>
        </div>
    </div>

    <script>
        function filtrarContenido() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const anioFiltro = document.getElementById('yearFilter').value;
            const tarjetas = document.querySelectorAll('.photo-card');
            const contador = document.getElementById('filterCount');

            // Mostrar contador solo al escribir o filtrar
            if (input !== "" || anioFiltro !== "all") {
                contador.classList.add('show');
            } else {
                contador.classList.remove('show');
            }

            tarjetas.forEach(t => {
                const nombre = t.getAttribute('data-name').toLowerCase();
                const anio = t.getAttribute('data-year');
                const coincide = nombre.includes(input) && (anioFiltro === 'all' || anio === anioFiltro);
                t.classList.toggle('hidden-card', !coincide);
            });
            
            const visibles = document.querySelectorAll('.photo-card:not(.hidden-card)').length;
            contador.textContent = `Resultados: ${visibles} de ${tarjetas.length}`;
        }

        function handleFlip(card, e) {
            if (e.target.closest('button')) return;
            card.classList.toggle('flipped');
        }

        function openModal(btn, e) {
            e.stopPropagation();
            const imgPath = btn.closest('.img-container').querySelector('.preview-img').src;
            const modalImg = document.getElementById('fullImage');
            
            modalImg.src = imgPath;
            modalImg.classList.remove('zoomed'); // Reset zoom cada vez que se abre
            document.getElementById('imageModal').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Bloquear scroll fondo
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
            document.body.style.overflow = 'auto'; // Reestablecer scroll
        }

        function toggleZoom(e) {
            e.stopPropagation();
            const img = e.target;
            img.classList.toggle('zoomed');
        }

        function askDonation(e) {
            e.stopPropagation();
            Swal.fire({
                title: '¿Apoyar el proyecto?',
                text: 'Tu apoyo ayuda a la conservación.',
                icon: 'info',
                showCancelButton: true,
                confirmButtonText: 'Donar y Descargar',
                cancelButtonText: 'Descargar Gratis',
                confirmButtonColor: '#16a34a',
            }).then((result) => {
                Swal.fire('¡Listo!', 'La descarga comenzará pronto.', 'success');
            });
        }
    </script>
</body>
</html>
