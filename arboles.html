<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wild Life Honduras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body.modal-open { overflow: hidden; }
        .card-container {
            position: relative; height: 450px; width: 100%;
            margin-bottom: 20px; perspective: 1000px;
        }
        /* Capa de botones: Plana, frontal y con prioridad absoluta */
        .ui-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 320px;
            z-index: 9999; pointer-events: none;
        }
        .ui-btn {
            pointer-events: auto; position: absolute;
            background: rgba(0,0,0,0.7); color: white;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-exp { 
            top: 10px; right: 10px; width: 44px; height: 44px; 
            border-radius: 10px; background: #16a34a !important;
        }
        .btn-side { top: 140px; width: 40px; height: 40px; border-radius: 50%; }
        /* Tarjeta que gira */
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s; transform-style: preserve-3d;
        }
        .flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; inset: 0;
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            border-radius: 1rem; overflow: hidden;
        }
        .card-back { transform: rotateY(180deg); background: #064e3b; color: white; }
    </style>
</head>
<body class="bg-stone-100 p-4">
    <nav class="fixed top-0 left-0 w-full bg-white border-b z-[5000] p-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="bg-green-900 text-white px-4 py-1 rounded-full text-xs font-bold">❮ MENÚ</a>
            <span class="font-black text-green-800">WILD LIFE HN</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 mt-24">
        <div class="card-container" data-name="mariposa">
            <div class="ui-layer">
                <button onclick="event.stopPropagation(); move(this, -1)" class="ui-btn btn-side left-2">❮</button>
                <button onclick="event.stopPropagation(); move(this, 1)" class="ui-btn btn-side right-2">❯</button>
                <button onclick="event.stopPropagation(); full(this)" class="ui-btn btn-exp">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                </button>
            </div>
            <div class="card-inner" onclick="this.parentElement.classList.toggle('flipped')">
                <div class="card-front bg-white shadow-lg">
                    <div class="h-[320px] bg-black">
                        <img src="img/mariposa1.jpg" class="w-full h-full object-cover slide active">
                        <img src="img/mariposa2.jpg" class="w-full h-full object-cover slide hidden">
                    </div>
                    <div class="p-4 text-center font-bold text-green-900 uppercase">Mariposa Malaquita</div>
                </div>
                <div class="card-back flex items-center justify-center p-6 text-center italic">"Especie común en Honduras"</div>
            </div>
        </div>
    </main>
    <div id="modal" class="fixed inset-0 bg-black/95 z-[10000] hidden items-center justify-center" onclick="this.classList.add('hidden')">
        <img id="mImg" class="max-w-[90%] max-h-[80vh] rounded">
    </div>

    <script>
        function move(btn, d) {
            const box = btn.closest('.card-container');
            const imgs = box.querySelectorAll('.slide');
            let idx = Array.from(imgs).findIndex(i => !i.classList.contains('hidden'));
            imgs[idx].classList.add('hidden');
            let next = (idx + d + imgs.length) % imgs.length;
            imgs[next].classList.remove('hidden');
        }

        function full(btn) {
            const box = btn.closest('.card-container');
            const active = Array.from(box.querySelectorAll('.slide')).find(i => !i.classList.contains('hidden'));
            document.getElementById('mImg').src = active.src;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').style.display = 'flex';
        }
    </script>
</body>
</html>
