<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Álbum Bosques | Honduras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* PREVIEW: Recortado (Zoom 2x) */
        .img-container { height: 350px; overflow: hidden; position: relative; background: #000; border-radius: 1rem 1rem 0 0; }
        .preview-img { 
            width: 100%; height: 100%; object-fit: cover; position: absolute; 
            transition: opacity 0.4s; opacity: 0;
            transform: scale(2); /* AQUÍ SE RECORTA */
        }
        .preview-img.active { opacity: 1; }

        /* MODAL: RESET TOTAL PARA VERLA COMPLETA */
        #imageModal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.95); z-index: 9999; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        #fullImage { 
            max-width: 90%; max-height: 80vh; 
            object-fit: contain; /* ESTO ASEGURA QUE SE VEA TODA */
            transform: scale(1) !important; /* RESETEA EL RECORTE */
            transition: transform 0.3s ease; cursor: zoom-in;
        }
        /* AMPLIACIÓN AL HACER CLIC */
        #fullImage.zoomed { transform: scale(2) !important; cursor: zoom-out; }

        .photo-card { perspective: 1000px; height: 480px; }
        .inner-card { transition: transform 0.6s; transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
        .flipped .inner-card { transform: rotateY(180deg); }
        .front-card, .back-card { backface-visibility: hidden; position: absolute; inset: 0; border-radius: 1rem; }
        .back-card { transform: rotateY(180deg); background: #064e3b; color: white; display: flex; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
        .hidden-card { display: none !important; }
    </style>
</head>
<body class="bg-stone-100 p-4 pt-32">

    <nav class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-md p-4 z-[100] border-b">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <button class="bg-green-800 text-white px-6 py-2 rounded-full font-bold">MENÚ</button>
            <input type="text" id="searchInput" oninput="filtrar()" placeholder="Buscar..." class="border p-2 rounded-xl">
        </div>
    </nav>

    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="photo-card" data-name="pino">
            <div class="inner-card" onclick="this.parentElement.classList.toggle('flipped')">
                <div class="front-card bg-white shadow-lg">
                    <div class="img-container">
                        <img src="img/Pino.jpg" class="preview-img active">
                        <button onclick="event.stopPropagation(); openModal(this)" class="absolute top-4 right-4 bg-green-600 text-white p-3 rounded-full z-50">🔍</button>
                    </div>
                    <div class="p-4 text-center font-bold">PINO HONDUREÑO</div>
                </div>
                <div class="back-card">Bosque de coníferas.</div>
            </div>
        </div>
        </main>

    <div id="imageModal" onclick="closeModal()">
        <span class="absolute top-5 right-10 text-white text-6xl cursor-pointer">&times;</span>
        <img id="fullImage" src="" onclick="event.stopPropagation(); this.classList.toggle('zoomed')">
        <button onclick="event.stopPropagation(); alert('Descargando...')" class="mt-8 bg-green-600 text-white px-10 py-3 rounded-full font-bold">Descargar</button>
    </div>

    <script>
        function openModal(btn) {
            const src = btn.parentElement.querySelector('.preview-img').src;
            const img = document.getElementById('fullImage');
            img.src = src;
            img.classList.remove('zoomed');
            document.getElementById('imageModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('imageModal').style.display = 'none'; }
        function filtrar() { /* Tu lógica de filtro aquí */ }
    </script>
</body>
</html>
