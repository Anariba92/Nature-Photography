<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Pro con Donación</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #1f2937;
            --light: #f3f4f6;
        }

        body { font-family: sans-serif; margin: 0; background: var(--light); }
        
        /* Grid de la Galería */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 8px;
            transition: transform 0.2s;
        }

        .gallery img:hover { transform: scale(1.03); }

        /* Visor Pantalla Completa */
        #viewer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #viewer img {
            max-width: 90%;
            max-height: 80%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Controles del Visor */
        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
        .nav-btn { position: absolute; top: 50%; color: white; font-size: 50px; cursor: pointer; padding: 20px; user-select: none; }
        .prev { left: 10px; }
        .next { right: 10px; }

        .download-area { margin-top: 20px; }
        .btn-main {
            background: var(--primary);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        /* Modal de Donación */
        #donation-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
        }

        .modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .btn-donate { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .btn-skip { background: #9ca3af; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="gallery" id="gallery">
    <img src="https://picsum.photos/id/10/800/600" alt="Imagen 1">
    <img src="https://picsum.photos/id/20/800/600" alt="Imagen 2">
    <img src="https://picsum.photos/id/30/800/600" alt="Imagen 3">
    <img src="https://picsum.photos/id/40/800/600" alt="Imagen 4">
</div>

<div id="viewer">
    <span class="close-btn" onclick="closeViewer()">&times;</span>
    <span class="nav-btn prev" onclick="changeImage(-1)">&#10094;</span>
    <img id="full-img" src="">
    <span class="nav-btn next" onclick="changeImage(1)">&#10095;</span>
    
    <div class="download-area">
        <button class="btn-main" onclick="showDonationModal()">Descargar Imagen</button>
    </div>
</div>

<div id="donation-modal">
    <div class="modal-content">
        <h3>¿Quieres apoyar al autor?</h3>
        <p>Tu descarga está lista. ¿Te gustaría realizar una pequeña donación antes de bajar el archivo?</p>
        <div class="modal-btns">
            <button class="btn-donate" onclick="processAction('donar')">Sí, donar</button>
            <button class="btn-skip" onclick="processAction('descargar')">No, solo descargar</button>
        </div>
    </div>
</div>

<script>
    const images = Array.from(document.querySelectorAll('.gallery img'));
    const viewer = document.getElementById('viewer');
    const fullImg = document.getElementById('full-img');
    const donationModal = document.getElementById('donation-modal');
    let currentIndex = 0;

    // Abrir visor
    images.forEach((img, index) => {
        img.onclick = () => {
            currentIndex = index;
            openViewer(img.src);
        };
    });

    function openViewer(src) {
        fullImg.src = src;
        viewer.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Bloquear scroll
    }

    function closeViewer() {
        viewer.style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function changeImage(dir) {
        currentIndex += dir;
        if (currentIndex < 0) currentIndex = images.length - 1;
        if (currentIndex >= images.length) currentIndex = 0;
        fullImg.src = images[currentIndex].src;
    }

    // Lógica de Descarga y Donación
    function showDonationModal() {
        donationModal.style.display = 'flex';
    }

    function processAction(action) {
        donationModal.style.display = 'none';
        
        if (action === 'donar') {
            alert("Redirigiendo a pasarela de pago...");
            // Aquí iría tu link de PayPal/Stripe
        }
        
        // Iniciar descarga en ambos casos (o solo en 'descargar' si prefieres)
        triggerDownload(fullImg.src);
    }

    function triggerDownload(url) {
        const a = document.createElement('a');
        a.href = url;
        a.download = `imagen-${currentIndex + 1}.jpg`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    // Cerrar con Escape
    window.onkeydown = (e) => {
        if (e.key === "Escape") {
            closeViewer();
            donationModal.style.display = 'none';
        }
    };
</script>

</body>
</html>
