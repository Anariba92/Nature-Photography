<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Forestal | Árboles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* Estilos Base */
        .img-container { height: 380px; overflow: hidden; position: relative; background: #1a1a1a; border-radius: 1rem 1rem 0 0; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; position: absolute; transition: opacity 0.4s ease; z-index: 0; opacity: 0; }
        .preview-img.active { opacity: 1; z-index: 10; }

        /* Corrección Flip Card para Móviles */
        .photo-card { perspective: 1200px; width: 100%; min-height: 450px; }
        .inner-card { 
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d; 
            position: relative; 
            width: 100%; 
            height: 100%; 
        }
        
        .front-card, .back-card { 
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden; 
            position: absolute; 
            inset: 0; 
            border-radius: 1rem; 
            width: 100%;
            height: 100%;
        }

        .flipped .inner-card { transform: rotateY(180deg); }
        .back-card { transform: rotateY(180deg); z-index: 20; }

        /* Modal Dark Mode Natural */
        #imageModal { display: none; position: fixed; inset: 0; background: rgba(6, 20, 14, 0.98); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        #fullImage { max-width: 90%; max-height: 75vh; object-fit: contain; }

        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; padding: 12px; border-radius: 50%; cursor: pointer; z-index: 60; border: none; }
        
        #downloadBtn { margin-top: 20px; background: #16a34a; color: white; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; z-index: 10000; border: none; }
    </style>
</head>
<body class="bg-stone-100 p-4 md:p-6 pt-24">

    <div class="fixed top-5 left-6 z-[100]">
        <a href="index.html" class="group flex items-center bg-white/90 backdrop-blur-sm border border-stone-200 px-5 py-2.5 rounded-full shadow-lg hover:bg-green-600 hover:text-white transition-all">
            <span class="mr-2 italic font-bold">❮</span>
            <span class="font-bold text-sm uppercase">Exploraciones</span>
        </a>
    </div>

    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-10">
        
        <div class="photo-card">
            <div class="relative cursor-pointer h-full" onclick="handleFlip(this, event)">
                <div class="inner-card">
                    <div class="front-card bg-white shadow-xl">
                        <div class="img-container">
                            <img src="img/Pino.jpg" class="preview-img active" alt="Pino">
                            <button onclick="changeSlide(this, -1, event)" class="nav-arrow left-2">❮</button>
                            <button onclick="changeSlide(this, 1, event)" class="nav-arrow right-2">❯</button>
                            <button onclick="openModal(this, event)" class="absolute top-4 right-4 bg-black/60 text-white p-3 rounded-full z-50">🔍</button>
                        </div>
                        <div class="p-4 text-center font-bold text-green-900 uppercase">Liquidámbar</div>
                    </div>
                    <div class="back-card bg-green-900 text-white p-8 flex items-center justify-center text-center">
                        <p>Hojas estrelladas y colores otoñales increíbles.</p>
                    </div>
                </div>
            </div>
        </div>

        </main>

    <div id="imageModal" onclick="this.style.display='none'">
        <span class="absolute top-5 right-8 text-white text-5xl cursor-pointer">&times;</span>
        <img id="fullImage" src="" onclick="event.stopPropagation()">
        <button id="downloadBtn" onclick="askDonation(event)">📥 Descargar</button>
    </div>

    <script>
        function handleFlip(el, e) {
            if (!e.target.closest('button')) {
                el.closest('.photo-card').classList.toggle('flipped');
            }
        }

        function changeSlide(btn, step, e) {
            e.stopPropagation();
            const container = btn.closest('.img-container');
            const imgs = container.querySelectorAll('.preview-img');
            let activeIdx = Array.from(imgs).findIndex(img => img.classList.contains('active'));
            imgs[activeIdx].classList.remove('active');
            let nextIdx = (activeIdx + step + imgs.length) % imgs.length;
            imgs[nextIdx].classList.add('active');
        }

        function openModal(btn, e) {
            e.stopPropagation();
            const container = btn.closest('.img-container');
            const activeImg = container.querySelector('.preview-img.active');
            document.getElementById('fullImage').src = activeImg.src;
            document.getElementById('imageModal').style.display = 'flex';
        }

        function askDonation(e) {
            e.stopPropagation();
            Swal.fire({
                title: '¿Apoyas el proyecto?',
                text: "Tu donación nos ayuda a seguir.",
                icon: 'info',
                showCancelButton: true,
                confirmButtonText: 'Donar',
                cancelButtonText: 'Descargar gratis'
            }).then((result) => {
                // Lógica de descarga simplificada
                const url = document.getElementById('fullImage').src;
                const a = document.createElement('a');
                a.href = url;
                a.download = "foto-naturaleza.jpg";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        }
    </script>
</body>
</html>
        }
    </script>
</body>
</html>
