<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explora Honduras | Árboles y Animales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Prevención de scroll al abrir modal */
        body.modal-open { overflow: hidden; }

        .img-container { height: 380px; overflow: hidden; position: relative; background: #1a1a1a; border-radius: 1rem 1rem 0 0; }
        .preview-img { 
            width: 100%; height: 100%; object-fit: cover; object-position: center; 
            position: absolute; transition: opacity 0.5s ease; 
            z-index: 0; opacity: 0; 
        }
        .preview-img.active { opacity: 1; z-index: 10; }
        
        /* PERSPECTIVA Y GIRO OPTIMIZADO */
        .photo-card { perspective: 1200px; height: 480px; -webkit-perspective: 1200px; }
        .inner-card { 
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d; 
            -webkit-transform-style: preserve-3d;
            position: relative; 
            width: 100%; height: 100%; cursor: pointer;
        }
        
        .flipped .inner-card { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); }
        
        .front-card, .back-card { 
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden;
            position: absolute; inset: 0; 
            border-radius: 1rem; overflow: hidden; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .front-card { z-index: 2; background: white; }
        .back-card { 
            transform: rotateY(180deg); 
            -webkit-transform: rotateY(180deg);
            background: #064e3b; color: white; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            padding: 2rem; text-align: center;
            z-index: 1;
        }
        
        #imageModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        #fullImage { max-width: 90%; max-height: 70vh; object-fit: contain; border-radius: 0.5rem; }
        .hidden-card { display: none !important; }

        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.2); color: white; border-radius: 50%;
            width: 55px; height: 55px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; transition: all 0.3s; z-index: 100; border: none;
        }
        .btn-prev { left: 15px; }
        .btn-next { right: 15px; }

        @media (max-width: 768px) {
            .nav-btn { width: 45px; height: 45px; background: rgba(0,0,0,0.5); }
            .img-container { height: 320px; }
            .photo-card { height: 440px; }
            body { padding-top: 220px; }
        }
    </style>
</head>

                    <option value="all">Todos los años</option>
                </select>
            </div>
        </div>
    </nav>
