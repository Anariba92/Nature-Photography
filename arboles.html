<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum: Bosques | Portafolio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .photo-card:hover .img-container img { transform: scale(1.1); transition: 0.5s; }
        .flipped .inner-card { transform: rotateY(180deg); }
        .inner-card { transition: transform 0.6s; transform-style: preserve-3d; }
        .img-container { overflow: hidden; position: relative; width: 100%; height: 100%; backface-visibility: hidden; }

        .gallery-image {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; transition: opacity 0.5s ease-in-out; transform: scale(1.25);
        }

        /* Modal / Lightbox */
        #imageModal {
            display: none; position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.95); z-index: 9999;
            justify-content: center; align-items: center;
        }
        #fullImage { max-width: 90%; max-height: 80%; border-radius: 8px; transition: 0.3s; }

        /* Botones de navegación del Modal */
        .modal-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.1); color: white; border: none;
            padding: 20px; cursor: pointer; border-radius: 50%; font-size: 24px;
            transition: 0.3s; display: none; /* Se activa solo si hay varias fotos */
        }
        .modal-nav:hover { background: rgba(22, 163, 74, 0.8); }
        #prevBtn { left: 20px; }
        #nextBtn { right: 20px; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800">

    <header class="py-10 text-center">
        <h1 class="text-4xl font-serif font-bold text-green-900">Colección: Bosques</h1>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8 pb-20">
        
        <div class="photo-card bg-white rounded-xl shadow-md">
            <div class="relative h-80 cursor-pointer" onclick="if(!event.target.closest('.nav-btn')) this.classList.toggle('flipped')">
                <div class="inner-card relative w-full h-full">
                    <div class="img-container">
                        <div class="absolute inset-0 w-full h-full gallery-wrapper">
                            <img src="img/Pino.jpg" class="gallery-image opacity-100 z-10">
                            <img src="img/bosque.jpg" class="gallery-image opacity-0 z-0">
                            </div>
                        <button onclick="event.stopPropagation(); openLightbox(this)" class="nav-btn absolute top-4 right-4 bg-black/60 text-white p-2 rounded-full z-50">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" /></svg>
                        </button>
                        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-2 z-50 bg-black/20 px-3 py-1 rounded-full">
                            <button onclick="event.stopPropagation(); changeCardImg(this, 0)" class="nav-btn gallery-dot w-2 h-2 rounded-full bg-white"></button>
                            <button onclick="event.stopPropagation(); changeCardImg(this, 1)" class="nav-btn gallery-dot w-2 h-2 rounded-full bg-white/40"></button>
                        </div>
                    </div>
                    <div class="absolute inset-0 w-full h-full bg-green-900 text-white p-6 [transform:rotateY(180deg)] [backface-visibility:hidden] flex items-center justify-center text-center">
                        <p>Info del Liquidámbar.</p>
                    </div>
                </div>
            </div>
            <div class="p-4 text-center font-bold text-green-800">Liquidámbar</div>
        </div>

        <div class="photo-card bg-white rounded-xl shadow-md">
            <div class="relative h-80 cursor-pointer" onclick="this.classList.toggle('flipped')">
                <div class="inner-card relative w-full h-full">
                    <div class="img-container">
                        <img src="img/bosque.jpg" class="gallery-image opacity-100 z-10">
                        <button onclick="event.stopPropagation(); openLightbox(this)" class="nav-btn absolute top-4 right-4 bg-black/60 text-white p-2 rounded-full z-50">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" /></svg>
                        </button>
                    </div>
                    <div class="absolute inset-0 w-full h-full bg-green-900 text-white p-6 [transform:rotateY(180deg)] [backface-visibility:hidden] flex items-center justify-center text-center">
                        <p>Info del Pino.</p>
                    </div>
                </div>
            </div>
            <div class="p-4 text-center font-bold text-green-800">Pino</div>
        </div>

        <div class="photo-card bg-white rounded-xl shadow-md">
            <div class="relative h-80 cursor-pointer" onclick="this.classList.toggle('flipped')">
                <div class="inner-card relative w-full h-full">
                    <div class="img-container">
                        <img src="img/montaña.jpg" class="gallery-image opacity-100 z-10">
                        <button onclick="event.stopPropagation(); openLightbox(this)" class="nav-btn absolute top-4 right-4 bg-black/60 text-white p-2 rounded-full z-50">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" /></svg>
                        </button>
                    </div>
                    <div class="absolute inset-0 w-full h-full bg-green-900 text-white p-6 [transform:rotateY(180deg)] [backface-visibility:hidden] flex items-center justify-center text-center">
                        <p>Info de la Montaña.</p>
                    </div>
                </div>
            </div>
            <div class="p-4 text-center font-bold text-green-800">Montaña</div>
        </div>
    </main>

    <div id="imageModal">
        <span class="absolute top-5 right-10 text-white text-5xl cursor-pointer" onclick="closeModal()">&times;</span>
        
        <button id="prevBtn" class="modal-nav" onclick="changeLightboxImg(-1)">&#10094;</button>
        <img id="fullImage" src="">
        <button id="nextBtn" class="modal-nav" onclick="changeLightboxImg(1)">&#10095;</button>
        
        <p class="absolute bottom-10 text-white/50 text-sm">Esc para cerrar</p>
    </div>

    <script>
        let currentImages = []; // Lista de fotos de la tarjeta activa
        let currentIndex = 0;   // Índice de la foto que se está viendo en grande

        // 1. Cambiar imagen en la tarjeta pequeña
        function changeCardImg(dot, idx) {
            const card = dot.closest('.photo-card');
            const imgs = card.querySelectorAll('.gallery-image');
            const dots = card.querySelectorAll('.gallery-dot');
            imgs.forEach((img, i) => {
                img.classList.toggle('opacity-100', i === idx);
                img.classList.toggle('z-10', i === idx);
                img.classList.toggle('opacity-0', i !== idx);
                img.classList.toggle('z-0', i !== idx);
            });
            dots.forEach((d, i) => d.classList.toggle('bg-white', i === idx));
            dots.forEach((d, i) => d.classList.toggle('bg-white/40', i !== idx));
        }

        // 2. Abrir el Lightbox
        function openLightbox(btn) {
            const card = btn.closest('.photo-card');
            const imgs = card.querySelectorAll('.gallery-image');
            
            // Guardamos todas las fotos de esta tarjeta
            currentImages = Array.from(imgs).map(i => i.src);
            
            // Buscamos cuál es la que está visible actualmente
            currentIndex = Array.from(imgs).findIndex(i => i.classList.contains('opacity-100'));

            const modal = document.getElementById('imageModal');
            const prev = document.getElementById('prevBtn');
            const next = document.getElementById('nextBtn');

            // Mostrar flechas solo si hay más de una foto
            const isGallery = currentImages.length > 1;
            prev.style.display = isGallery ? 'block' : 'none';
            next.style.display = isGallery ? 'block' : 'none';

            updateModalImg();
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        // 3. Cambiar imagen dentro del Modal
        function changeLightboxImg(step) {
            currentIndex += step;
            if (currentIndex >= currentImages.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = currentImages.length - 1;
            updateModalImg();
        }

        function updateModalImg() {
            document.getElementById('fullImage').src = currentImages[currentIndex];
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
            document.body.style.overflow = '';
        }

        // Cerrar con Escape
        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeModal();
            if (document.getElementById('imageModal').style.display === 'flex') {
                if (e.key === "ArrowLeft") changeLightboxImg(-1);
                if (e.key === "ArrowRight") changeLightboxImg(1);
            }
        });
    </script>
</body>
</html>
