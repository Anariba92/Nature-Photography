<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Bosques | Árboles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Contenedor principal de la imagen */
        .img-container { 
            height: 380px; 
            overflow: hidden; 
            position: relative; 
            background: #1a1a1a;
            border-radius: 1rem 1rem 0 0; 
        }

        /* Efecto de recorte con degradado */
        .preview-cut {
            height: 200px !important; /* Altura recortada */
        }
        
        .preview-cut::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(transparent, #1a1a1a);
            z-index: 15;
        }

        .preview-img {
            width: 100%; height: 100%; object-fit: cover; object-position: center; 
            position: absolute; transition: opacity 0.5s ease; 
            z-index: 0; opacity: 0; 
        }
        .preview-img.active { opacity: 1; z-index: 10; }
        
        .photo-card { perspective: 1000px; height: 460px; transition: transform 0.3s; }
        .inner-card { transition: transform 0.8s; transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
        .flipped .inner-card { transform: rotateY(180deg); }
        .front-card, .back-card { backface-visibility: hidden; position: absolute; inset: 0; border-radius: 1rem; overflow: hidden; }
        
        .back-card { 
            transform: rotateY(180deg); background: #064e3b; color: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 2rem; text-align: center; 
        }
        
        #imageModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        #fullImage { max-width: 90%; max-height: 75vh; object-fit: contain; border-radius: 8px; }
        
        .hidden-card { display: none !important; }

        /* Botón de expandir dentro de la card */
        .expand-btn {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(255,255,255,0.9);
            color: #064e3b;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-stone-100 p-4 pt-48 md:pt-32">
 
    <nav class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-md border-b z-[100] p-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-4 items-center justify-between">
            <a href="index.html" class="bg-green-900 text-white px-5 py-2 rounded-full font-bold text-sm hover:bg-green-700 transition-all">❮ MENÚ</a>
            
            <div class="flex flex-wrap gap-2 w-full md:w-auto">
                <input type="text" id="searchInput" oninput="filtrarContenido()" placeholder="¿Qué buscas?" class="flex-1 md:w-64 px-4 py-2 rounded-xl border border-stone-300 outline-none focus:ring-2 focus:ring-green-600">
                <select id="yearFilter" onchange="filtrarContenido()" class="px-4 py-2 rounded-xl border border-stone-300 bg-white">
                    <option value="all">Todos los años</option>
                </select>
            </div>
        </div>
    </nav>
 
    <main id="albumGrid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="photo-card" data-name="liquidambar arbol estrella" data-year="2026">
            <div class="relative h-full cursor-pointer" onclick="handleFlip(this, event)">
                <div class="inner-card">
                    <div class="front-card bg-white shadow-lg">
                        <div class="img-container preview-cut">
                            <img src="img/Pino.jpg" class="preview-img active">
                            <img src="img/hoja.jpg" class="preview-img">
                            
                            <button onclick="changeSlide(this, 1, event)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/30 text-white p-2 rounded-full z-20 hover:bg-black/50">❯</button>
                            
                            <button onclick="openModal(this, event)" class="expand-btn">EXPANDIR 🔍</button>
                        </div>
                        <div class="p-4 text-center font-bold text-green-900 uppercase">Liquidámbar</div>
                    </div>
                    <div class="back-card">
                        <p class="italic">"Bosques frescos y hojas estrelladas."</p>
                        <span class="text-xs mt-4 opacity-70">AÑO: 2026</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="photo-card" data-name="san juancito paisaje montaña" data-year="2026">
            <div class="relative h-full cursor-pointer" onclick="handleFlip(this, event)">
                <div class="inner-card">
                    <div class="front-card bg-white shadow-lg">
                        <div class="img-container preview-cut">
                            <img src="img/montaña.jpg" class="preview-img active">
                            <button onclick="openModal(this, event)" class="expand-btn">EXPANDIR 🔍</button>
                        </div>
                        <div class="p-4 text-center font-bold text-green-900 uppercase">San Juancito</div>
                    </div>
                    <div class="back-card">
                        <p class="italic">"Panorámica desde Francisco Morazán."</p>
                        <span class="text-xs mt-4 opacity-70">AÑO: 2026</span>
                    </div>
                </div>
            </div>
        </div>
 
    </main>
 
    <div id="imageModal">
        <span onclick="closeModal()" class="absolute top-5 right-10 text-white text-5xl cursor-pointer hover:text-gray-300">&times;</span>
        <img id="fullImage" src="">
        <div class="flex gap-4">
            <button onclick="closeModal()" class="mt-5 bg-white/20 text-white border border-white/50 px-6 py-2 rounded-full font-bold hover:bg-white/30 transition-all">Cerrar</button>
            <button onclick="askDonation(event)" class="mt-5 bg-green-600 text-white px-8 py-2 rounded-full font-bold hover:bg-green-500 shadow-lg transform hover:scale-105 transition-all">Descargar Foto</button>
        </div>
    </div>
 
    <script>
        // --- 1. CONFIGURACIÓN INICIAL ---
        window.addEventListener('DOMContentLoaded', () => {
            const tarjetas = document.querySelectorAll('.photo-card');
            const selectAnio = document.getElementById('yearFilter');
            const listaAnios = new Set();

            tarjetas.forEach(t => {
                const anio = t.getAttribute('data-year');
                if(anio) listaAnios.add(anio);
            });

            Array.from(listaAnios).sort().reverse().forEach(anio => {
                const opt = document.createElement('option');
                opt.value = anio;
                opt.textContent = anio;
                selectAnio.appendChild(opt);
            });
        });
 
        // --- 2. FILTRADO ---
        function filtrarContenido() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const anioFiltro = document.getElementById('yearFilter').value;
            const tarjetas = document.querySelectorAll('.photo-card');
 
            tarjetas.forEach(tarjeta => {
                const nombre = (tarjeta.getAttribute('data-name') || "").toLowerCase();
                const anio = tarjeta.getAttribute('data-year') || "";
                const coincideTexto = nombre.includes(input);
                const coincideAnio = (anioFiltro === 'all' || anio === anioFiltro);
 
                if (coincideTexto && coincideAnio) {
                    tarjeta.classList.remove('hidden-card');
                } else {
                    tarjeta.classList.add('hidden-card');
                }
            });
        }
 
        // --- 3. INTERACCIONES ---
        function handleFlip(card, e) {
            // Evita que la tarjeta gire si haces clic en los botones de expandir o cambio de imagen
            if (e.target.closest('button')) return;
            card.classList.toggle('flipped');
        }
 
        function changeSlide(btn, step, e) {
            e.stopPropagation();
            const container = btn.closest('.img-container');
            const imgs = container.querySelectorAll('.preview-img');
            let activeIdx = Array.from(imgs).findIndex(img => img.classList.contains('active'));
            
            imgs[activeIdx].classList.remove('active');
            let nextIdx = (activeIdx + step) % imgs.length;
            if (nextIdx < 0) nextIdx = imgs.length - 1;
            imgs[nextIdx].classList.add('active');
        }
 
        function openModal(btn, e) {
            e.stopPropagation();
            const container = btn.closest('.img-container');
            const activeImg = container.querySelector('.preview-img.active');
            document.getElementById('fullImage').src = activeImg.src;
            document.getElementById('imageModal').style.display = 'flex';
        }
 
        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }
 
        // --- 4. LÓGICA DE DONACIÓN Y DESCARGA ---
        function askDonation(e) {
            e.stopPropagation();
            const imageUrl = document.getElementById('fullImage').src;

            Swal.fire({
                title: '¿Deseas apoyar este proyecto?',
                text: "Tu donación nos ayuda a seguir fotografiando nuestros bosques. ¡Puedes descargarla gratis si lo prefieres!",
                icon: 'info',
                showCancelButton: true,
                confirmButtonColor: '#059669', // Verde
                cancelButtonColor: '#6b7280',  // Gris
                confirmButtonText: '💖 Donar y Descargar',
                cancelButtonText: 'Descargar gratis'
            }).then((result) => {
                // Independientemente del resultado, procedemos a la descarga
                if (result.isConfirmed) {
                    // Aquí podrías redirigir a una página de PayPal/Donación antes o después
                    window.open('https://paypal.me/tu-usuario', '_blank');
                    descargarImagen(imageUrl);
                } else if (result.dismiss === Swal.DismissReason.cancel) {
                    descargarImagen(imageUrl);
                }
            });
        }

        function descargarImagen(url) {
            const link = document.createElement('a');
            link.href = url;
            link.download = 'foto-bosque.jpg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: 'success',
                title: 'Descarga iniciada',
                showConfirmButton: false,
                timer: 2000
            });
        }
    </script>
</body>
</html>
