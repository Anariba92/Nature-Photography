<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum: Bosques | Portafolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .photo-card:hover .img-container img { transform: scale(1.1); transition: 0.5s; }
        .flipped .inner-card { transform: rotateY(180deg); }
        .img-container { overflow: hidden; position: relative; }
        .inner-card { transition: transform 0.6s; transform-style: preserve-3d; }
        
        /* Estilos del Modal (Forzados para que funcione) */
        #imageModal {
            display: none; /* Por defecto oculto */
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #fullImage {
            max-width: 90%;
            max-height: 80%;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="bg-stone-100 text-stone-800">

    <header class="py-10 text-center">
        <h1 class="text-4xl font-serif font-bold text-green-900">Colección: Bosques</h1>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="photo-card bg-white rounded-xl overflow-hidden shadow-md">
            <div class="relative h-80 cursor-pointer" onclick="if(!event.target.closest('.nav-btn')) this.classList.toggle('flipped')">
                <div class="inner-card relative w-full h-full">
                    <div class="absolute inset-0 w-full h-full [backface-visibility:hidden] img-container">
                        <img src="img/Pino.jpg" class="active-img absolute inset-0 w-full h-full object-cover scale-125">
                        <button onclick="event.stopPropagation(); showFull(this)" class="nav-btn absolute top-4 right-4 bg-black/60 text-white p-2 rounded-full z-50">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" /></svg>
                        </button>
                    </div>
                    <div class="absolute inset-0 w-full h-full bg-green-900 text-white p-6 [transform:rotateY(180deg)] [backface-visibility:hidden] flex items-center justify-center">
                        <p>Información del Liquidámbar...</p>
                    </div>
                </div>
            </div>
            <div class="p-4 text-center font-bold text-green-800">Liquidámbar</div>
        </div>

        <div class="photo-card bg-white rounded-xl overflow-hidden shadow-md">
            <div class="relative h-80 cursor-pointer" onclick="this.classList.toggle('flipped')">
                <div class="inner-card relative w-full h-full">
                    <div class="absolute inset-0 w-full h-full [backface-visibility:hidden] img-container">
                        <img src="img/bosque.jpg" class="active-img absolute inset-0 w-full h-full object-cover scale-125">
                        <button onclick="event.stopPropagation(); showFull(this)" class="nav-btn absolute top-4 right-4 bg-black/60 text-white p-2 rounded-full z-50">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" /></svg>
                        </button>
                    </div>
                    <div class="absolute inset-0 w-full h-full bg-green-900 text-white p-6 [transform:rotateY(180deg)] [backface-visibility:hidden] flex items-center justify-center text-center">
                        <p>Información del Pino Nacional.</p>
                    </div>
                </div>
            </div>
            <div class="p-4 text-center font-bold text-green-800">Pino</div>
        </div>

        <div class="photo-card bg-white rounded-xl overflow-hidden shadow-md">
            <div class="relative h-80 cursor-pointer" onclick="this.classList.toggle('flipped')">
                <div class="inner-card relative w-full h-full">
                    <div class="absolute inset-0 w-full h-full [backface-visibility:hidden] img-container">
                        <img src="img/montaña.jpg" class="active-img absolute inset-0 w-full h-full object-cover scale-125">
                        <button onclick="event.stopPropagation(); showFull(this)" class="nav-btn absolute top-4 right-4 bg-black/60 text-white p-2 rounded-full z-50">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" /></svg>
                        </button>
                    </div>
                    <div class="absolute inset-0 w-full h-full bg-green-900 text-white p-6 [transform:rotateY(180deg)] [backface-visibility:hidden] flex items-center justify-center text-center">
                        <p>Información de la Montaña.</p>
                    </div>
                </div>
            </div>
            <div class="p-4 text-center font-bold text-green-800">Montaña</div>
        </div>

    </main>

    <div id="imageModal" onclick="this.style.display='none'">
        <span class="absolute top-5 right-10 text-white text-5xl cursor-pointer">&times;</span>
        <img id="fullImage" src="">
        <p class="text-white mt-4 italic">Haz clic en cualquier lugar para cerrar</p>
    </div>

    <script>
        function showFull(boton) {
            // Buscamos la imagen que está dentro de la misma tarjeta que el botón
            const card = boton.closest('.photo-card');
            const imagenEnTarjeta = card.querySelector('.active-img');
            
            // Obtenemos el modal y la imagen del modal
            const modal = document.getElementById('imageModal');
            const fullImg = document.getElementById('fullImage');
            
            // Pasamos la ruta de la imagen
            fullImg.src = imagenEnTarjeta.src;
            
            // Mostramos el modal usando estilo directo para evitar errores de Tailwind
            modal.style.display = 'flex';
        }
    </script>
</body>
</html>
