<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Bosques | Árboles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .img-container { height: 380px; overflow: hidden; position: relative; background: #1a1a1a; border-radius: 1rem 1rem 0 0; }
        .preview-img { 
            width: 100%; height: 100%; object-fit: cover; object-position: center; 
            position: absolute; transition: opacity 0.5s ease; 
            z-index: 0; opacity: 0; 
        }
        .preview-img.active { opacity: 1; z-index: 10; }
        
        .photo-card { perspective: 1000px; height: 460px; transition: transform 0.3s; }
        .inner-card { transition: transform 0.8s; transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
        .flipped .inner-card { transform: rotateY(180deg); }
        .front-card, .back-card { backface-visibility: hidden; position: absolute; inset: 0; border-radius: 1rem; overflow: hidden; }
        .back-card { 
            transform: rotateY(180deg); background: #064e3b; color: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; 
        }
        
        #imageModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        #fullImage { max-width: 90%; max-height: 80vh; object-fit: contain; cursor: default; }
        
        .hidden-card { display: none !important; }

        /* Ajuste para que SweetAlert no se vea pequeño dentro del modal */
        .swal2-container { z-index: 10000 !important; }
    </style>
</head>
<body class="bg-stone-100 p-4 pt-48 md:pt-32">

    <nav class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-md border-b z-[100] p-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-4 items-center justify-between">
            <a href="index.html" class="bg-green-900 text-white px-5 py-2 rounded-full font-bold text-sm hover:bg-green-700 transition-all">
                ❮ MENÚ
            </a>
            
            <div class="flex flex-wrap gap-2 w-full md:w-auto">
                <input type="text" id="searchInput" oninput="filtrarContenido()" placeholder="¿Qué buscas? (ej: Pino)" 
                    class="flex-1 md:w-64 px-4 py-2 rounded-xl border border-stone-300 outline-none focus:ring-2 focus:ring-green-600">
                
                <select id="yearFilter" onchange="filtrarContenido()" class="px-4 py-2 rounded-xl border border-stone-300 bg-white outline-none">
                    <option value="all">Todos los años</option>
                </select>
            </div>
        </div>
    </nav>

    <main id="albumGrid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="photo-card" data-name="liquidambar arbol estrella" data-year="2026">
            <div class="relative h-full cursor-pointer" onclick="handleFlip(this, event)">
                <div class="inner-card">
                    <div class="front-card bg-white shadow-lg">
                        <div class="img-container">
                            <img src="img/Pino.jpg" class="preview-img active" loading="lazy">
                            <img src="img/hoja.jpg" class="preview-img" loading="lazy">
                            <button onclick="changeSlide(this, 1, event)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/30 text-white p-2 rounded-full z-20 hover:bg-black/50">❯</button>
                            <button onclick="openModal(this, event)" class="absolute top-2 right-2 bg-green-600 text-white p-2 rounded-full z-20">🔍</button>
                        </div>
                        <div class="p-4 text-center font-bold text-green-900 uppercase">Liquidámbar</div>
                    </div>
                    <div class="back-card">
                        <p class="italic">"Se puede encontrar en climas frescos y tiene una hojas particular en forma estrelladas."</p>
                        <span class="text-xs mt-4 opacity-70">AÑO: 2026</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="photo-card" data-name="san juancito paisaje montaña" data-year="2026">
            <div class="relative h-full cursor-pointer" onclick="handleFlip(this, event)">
                <div class="inner-card">
                    <div class="front-card bg-white shadow-lg">
                        <div class="img-container">
                            <img src="img/montaña.jpg" class="preview-img active" loading="lazy">
                            <button onclick="openModal(this, event)" class="absolute top-2 right-2 bg-green-600 text-white p-2 rounded-full z-20">🔍</button>
                        </div>
                        <div class="p-4 text-center font-bold text-green-900 uppercase">Sitio, San Juancito</div>
                    </div>
                    <div class="back-card">
                        <p class="italic">"Panorámica desde San Juancito, en Francisco Morazán."</p>
                        <span class="text-xs mt-4 opacity-70">AÑO: 2026</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="photo-card" data-name="pino ocote pinabete bosque" data-year="2026">
            <div class="relative h-full cursor-pointer" onclick="handleFlip(this, event)">
                <div class="inner-card">
                    <div class="front-card bg-white shadow-lg">
                        <div class="img-container">
                            <img src="img/bosque.jpg" class="preview-img active" loading="lazy">
                            <button onclick="openModal(this, event)" class="absolute top-2 right-2 bg-green-600 text-white p-2 rounded-full z-20">🔍</button>
                        </div>
                        <div class="p-4 text-center font-bold text-green-900 uppercase">Pino Ocote</div>
                    </div>
                    <div class="back-card">
                        <p class="italic">"En Honduras podemos encontrar 7 especies de pino."</p>
                        <span class="text-xs mt-4 opacity-70">AÑO: 2026</span>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div id="imageModal" onclick="closeModal(event)">
        <span class="absolute top-5 right-10 text-white text-5xl cursor-pointer hover:text-green-400" onclick="document.getElementById('imageModal').style.display='none'">&times;</span>
        <img id="fullImage" src="" onclick="event.stopPropagation()">
        <button onclick="askDonation(event)" class="mt-5 bg-green-600 text-white px-8 py-3 rounded-full font-bold hover:bg-green-500 transition-colors">Descargar Foto</button>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const tarjetas = document.querySelectorAll('.photo-card');
            const selectAnio = document.getElementById('yearFilter');
            const listaAnios = new Set();
            tarjetas.forEach(t => {
                const anio = t.getAttribute('data-year');
                if(anio) listaAnios.add(anio);
            });
            Array.from(listaAnios).sort().reverse().forEach(anio => {
                const opt = document.createElement('option');
                opt.value = anio;
                opt.textContent = anio;
                selectAnio.appendChild(opt);
            });
        });

        function filtrarContenido() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const anioFiltro = document.getElementById('yearFilter').value;
            const tarjetas = document.querySelectorAll('.photo-card');
            tarjetas.forEach(tarjeta => {
                const nombre = (tarjeta.getAttribute('data-name') || "").toLowerCase();
                const anio = tarjeta.getAttribute('data-year') || "";
                const coincideTexto = nombre.includes(input);
                const coincideAnio = (anioFiltro === 'all' || anio === anioFiltro);
                tarjeta.classList.toggle('hidden-card', !(coincideTexto && coincideAnio));
            });
        }

        function handleFlip(card, e) {
            if (e.target.closest('button')) return;
            card.classList.toggle('flipped');
        }

        function changeSlide(btn, step, e) {
            e.stopPropagation();
            const container = btn.closest('.img-container');
            const imgs = container.querySelectorAll('.preview-img');
            if (imgs.length <= 1) return;
            let activeIdx = Array.from(imgs).findIndex(img => img.classList.contains('active'));
            imgs[activeIdx].classList.remove('active');
            let nextIdx = (activeIdx + step + imgs.length) % imgs.length;
            imgs[nextIdx].classList.add('active');
        }

        function openModal(btn, e) {
            e.stopPropagation();
            const container = btn.closest('.img-container');
            const activeImg = container.querySelector('.preview-img.active');
            document.getElementById('fullImage').src = activeImg.src;
            document.getElementById('imageModal').style.display = 'flex';
        }

        function closeModal(e) {
            if (e.target.id === 'imageModal') {
                document.getElementById('imageModal').style.display = 'none';
            }
        }

        function askDonation(e) {
            e.stopPropagation();
            // LA CLAVE: Usamos 'target' para que el mensaje se renderice dentro del modal
            Swal.fire({
                title: '¿Quieres descargar la foto?',
                text: "Puedes apoyarnos con una donación o descargar gratis.",
                icon: 'question',
                target: document.getElementById('imageModal'), // Esto lo pone al frente
                showCancelButton: true,
                confirmButtonColor: '#059669',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Donar y bajar',
                cancelButtonText: 'Bajar gratis'
            }).then((result) => {
                if (result.isConfirmed || result.dismiss === Swal.DismissReason.cancel) {
                    const link = document.createElement('a');
                    link.href = document.getElementById('fullImage').src;
                    link.download = 'foto-bosque.jpg';
                    link.click();
                }
            });
        }
    </script>
</body>
</html>
