<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum: Árboles | Exploraciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .photo-card:hover .img-container img { transform: scale(1.1); }
        .flipped .inner-card { transform: rotateY(180deg); }
        .img-container { overflow: hidden; }
        /* Animación suave para el cambio de fotos */
        .gallery-image { transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800">

    <nav class="p-6 max-w-6xl mx-auto">
        <a href="index.html" class="inline-flex items-center text-green-800 font-bold hover:text-green-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Volver al Inicio
        </a>
    </nav>

    <header class="py-10 px-6 text-center">
        <h1 class="text-4xl font-serif font-bold text-green-900">Colección: Árboles</h1>
        <p class="mt-2 text-stone-500 italic">Capturas detalladas de la flora nacional.</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="photo-card bg-white rounded-lg overflow-hidden shadow-sm border border-stone-200">
                <div class="relative w-full h-80 cursor-pointer group" onclick="if(!event.target.closest('.gallery-dot')) this.classList.toggle('flipped')">
                    <div class="inner-card relative w-full h-full duration-500 [transform-style:preserve-3d]">
                        
                        <div class="absolute inset-0 w-full h-full [backface-visibility:hidden] img-container">
                            
                            <div class="absolute inset-0 w-full h-full">
                                <img src="img/Pino.jpg" class="gallery-image absolute inset-0 w-full h-full object-cover scale-125 object-top opacity-100 z-10">
                                <img src="img/bosque.jpg" class="gallery-image absolute inset-0 w-full h-full object-cover scale-150 object-center opacity-0 z-0">
                            </div>

                            <button type="button" onclick="event.stopPropagation(); openActiveImage(this)" class="absolute top-3 right-3 bg-black/60 text-white p-2 rounded-full z-30 hover:bg-green-600 transition-colors shadow-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
                                </svg>
                            </button>

                            <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex space-x-2 z-30 bg-black/20 px-3 py-1 rounded-full backdrop-blur-sm">
                                <button type="button" onclick="event.stopPropagation(); changeImage(this, 0)" class="gallery-dot w-2.5 h-2.5 rounded-full bg-white transition-all"></button>
                                <button type="button" onclick="event.stopPropagation(); changeImage(this, 1)" class="gallery-dot w-2.5 h-2.5 rounded-full bg-white/40 transition-all"></button>
                            </div>

                            <div class="absolute bottom-4 left-4 bg-black/50 text-white px-3 py-1 rounded-full text-xs z-20">Info ↺</div>
                        </div>

                        <div class="absolute inset-0 w-full h-full bg-green-900 text-white p-6 [transform:rotateY(180deg)] [backface-visibility:hidden] flex flex-col justify-center items-center text-center">
                            <h3 class="text-xl font-bold mb-2 italic">Liquidámbar</h3>
                            <p class="text-sm">Árbol caducifolio que destaca por sus colores otoñales vibrantes.</p>
                        </div>
                    </div>
                </div>
                <div class="p-4"><h3 class="font-bold text-green-800 text-center">Nombre común: Liquidámbar</h3></div>
            </div>
            </div>
    </main>

    <div id="imageModal" class="fixed inset-0 bg-black/95 z-[60] hidden flex items-center justify-center p-4 cursor-pointer" onclick="closeModal()">
        <span class="absolute top-6 right-6 text-white text-4xl">&times;</span>
        <img id="fullImage" src="" class="max-w-full max-h-full rounded-lg shadow-2xl transition-all transform scale-95">
    </div>

    <script>
        // Cambiar entre imágenes de la galería
        function changeImage(dotButton, index) {
            const card = dotButton.closest('.photo-card');
            const images = card.querySelectorAll('.gallery-image');
            const dots = card.querySelectorAll('.gallery-dot');

            images.forEach((img, i) => {
                img.classList.replace(i === index ? 'opacity-0' : 'opacity-100', i === index ? 'opacity-100' : 'opacity-0');
                img.classList.replace(i === index ? 'z-0' : 'z-10', i === index ? 'z-10' : 'z-0');
            });

            dots.forEach((dot, i) => {
                dot.classList.replace(i === index ? 'bg-white/40' : 'bg-white', i === index ? 'bg-white' : 'bg-white/40');
            });
        }

        // Lupa: Abre la imagen que está visible en ese momento
        function openActiveImage(btn) {
            const card = btn.closest('.photo-card');
            const activeImg = card.querySelector('.gallery-image.opacity-100');
            if (activeImg) {
                const modal = document.getElementById('imageModal');
                const modalImg = document.getElementById('fullImage');
                modalImg.src = activeImg.src;
                modal.classList.remove('hidden');
                setTimeout(() => modalImg.classList.remove('scale-95'), 10);
            }
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            document.getElementById('fullImage').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }
    </script>
</body>
</html>
