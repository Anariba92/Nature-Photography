<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum: Bosques | Versión Pro con Flechas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .img-container { height: 380px; overflow: hidden; position: relative; background: #1a1a1a; }
        
        /* Imagen en el cuadro: Recortada para invitar a hacer click */
        .preview-img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; transition: opacity 0.4s ease;
        }

        /* Efecto Flip */
        .inner-card { transition: transform 0.6s; transform-style: preserve-3d; position: relative; width: 100%; height: 380px; }
        .flipped .inner-card { transform: rotateY(180deg); }
        .back-card { transform: rotateY(180deg); backface-visibility: hidden; position: absolute; inset: 0; }
        .front-card { backface-visibility: hidden; position: absolute; inset: 0; }

        /* Modal / Lightbox */
        #imageModal {
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.98); z-index: 9999; 
            align-items: center; justify-content: center;
        }
        #fullImage { max-width: 90%; max-height: 85vh; object-fit: contain; transition: 0.3s; }

        /* Botones de Navegación */
        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.4); color: white; padding: 12px;
            border-radius: 50%; cursor: pointer; z-index: 60; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .nav-arrow:hover { background: #16a34a; scale: 1.1; }
        
        /* Ocultar flechas si solo hay una imagen */
        .only-one .nav-arrow, .only-one .dots-container { display: none; }
    </style>
</head>

    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-10">

                <div class="inner-card">

                            <img src="img/tronco.jpg" class="preview-img" style="opacity: 0; z-index: 0;">
