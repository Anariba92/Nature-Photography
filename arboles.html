<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Life Honduras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Contenedor estático, sin 3D para evitar bloqueos */
        .card-container {
            position: relative;
            height: 420px;
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .img-box {
            width: 100%;
            height: 300px;
            position: relative;
            background: #000;
        }

        .slide-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* CAPA DE INFORMACIÓN (Se muestra al hacer click en el texto) */
        .info-overlay {
            position: absolute;
            inset: 0;
            background: #064e3b;
            color: white;
            display: none; /* Oculto por defecto */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            z-index: 20;
        }

        .info-overlay.active { display: flex; }

        /* BOTÓN DE EXPANSIÓN: Ahora es un elemento flotante simple */
        .btn-zoom {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #16a34a;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50; /* Prioridad máxima */
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-info {
            background: #f3f4f6;
            width: 100%;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            color: #064e3b;
            cursor: pointer;
            border: none;
            border-top: 1px solid #e5e7eb;
        }

        #imageModal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.9); z-index: 1000; 
            align-items: center; justify-content: center; 
        }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <nav class="fixed top-0 left-0 w-full bg-white border-b z-[500] p-4 text-center font-black text-green-800">
        WILD LIFE HONDURAS
    </nav>

    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 mt-20">
        
        <div class="card-container" id="c1">
            <button class="btn-zoom" onclick="verImagen('img/mariposa1.jpg')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
            </button>

            <div class="info-overlay" id="info1" onclick="this.classList.remove('active')">
                <p class="text-lg italic">"Siproeta stelenes: Mariposa Malaquita. Muy común en zonas húmedas de Honduras."</p>
                <p class="mt-4 text-xs opacity-70 text-white">Click para cerrar</p>
            </div>

            <div class="img-box">
                <img src="img/mariposa1.jpg" class="slide-img">
            </div>
            
            <button class="btn-info" onclick="document.getElementById('info1').classList.add('active')">
                MARIPOSA MALAQUITA ❯
            </button>
        </div>

        <div class="card-container" id="c2">
            <button class="btn-zoom" onclick="verImagen('img/chinche.jpg')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
            </button>

            <div class="info-overlay" id="info2" onclick="this.classList.remove('active')">
                <p class="text-lg italic">"Chinche depredadora: Control natural de plagas en cafetales."</p>
                <p class="mt-4 text-xs opacity-70 text-white">Click para cerrar</p>
            </div>

            <div class="img-box">
                <img src="img/chinche.jpg" class="slide-img">
            </div>
            
            <button class="btn-info" onclick="document.getElementById('info2').classList.add('active')">
                CHINCHE DE CAMPO ❯
            </button>
        </div>

    </main>

    <div id="imageModal" onclick="this.style.display='none'">
        <img id="modalImg" class="max-w-[90%] max-h-[85vh] rounded shadow-2xl">
    </div>

    <script>
        function verImagen(src) {
            document.getElementById('modalImg').src = src;
            document.getElementById('imageModal').style.display = 'flex';
        }
    </script>
</body>
</html>
