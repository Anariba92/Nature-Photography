<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum: Bosques | Portafolio Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* La tarjeta tiene un tamaño fijo para que la imagen se vea "recortada" */
        .img-container { 
            height: 350px; 
            overflow: hidden; 
            position: relative; 
            background: #e5e7eb;
        }
        
        /* Imagen en el cuadro: Se ve recortada y con zoom */
        .preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Esto hace que no se vea completa, sino que llene el espacio */
            position: absolute;
            transition: opacity 0.3s ease;
        }

        /* Efecto Flip */
        .inner-card { transition: transform 0.6s; transform-style: preserve-3d; position: relative; width: 100%; height: 350px; }
        .flipped .inner-card { transform: rotateY(180deg); }
        .back-card { transform: rotateY(180deg); backface-visibility: hidden; position: absolute; inset: 0; }
        .front-card { backface-visibility: hidden; position: absolute; inset: 0; }

        /* Modal / Lightbox */
        #imageModal {
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            z-index: 9999; 
            align-items: center; 
            justify-content: center;
        }
        /* Imagen en modo completo: Se ve TODA la imagen sin recortes */
        #fullImage { 
            max-width: 95%; 
            max-height: 90vh; 
            object-fit: contain; 
        }

        .modal-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.1); color: white; padding: 20px;
            border-radius: 50%; font-size: 30px; cursor: pointer; z-index: 10000;
        }
    </style>
</head>
<body class="bg-stone-100 p-8">

    <main class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="photo-card bg-white rounded-xl shadow-xl overflow-hidden" id="card-1">
            <div class="relative cursor-pointer" onclick="if(!event.target.closest('.no-flip')) this.closest('.photo-card').classList.toggle('flipped')">
                <div class="inner-card">
                    <div class="front-card">
                        <div class="img-container">
                            <img src="img/Pino.jpg" class="preview-img" style="opacity: 1; z-index: 10;">
                            <img src="img/bosque.jpg" class="preview-img" style="opacity: 0; z-index: 0;">
                            
                            <button onclick="event.stopPropagation(); openGallery(1)" class="no-flip absolute top-4 right-4 bg-black/60 text-white p-3 rounded-full z-50">
                                🔍
                            </button>

                            <div class="no-flip absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-2 z-50 bg-black/30 p-2 rounded-full">
                                <div onclick="event.stopPropagation(); switchImg(1, 0)" class="w-3 h-3 rounded-full bg-white cursor-pointer"></div>
                                <div onclick="event.stopPropagation(); switchImg(1, 1)" class="w-3 h-3 rounded-full bg-white/40 cursor-pointer"></div>
                            </div>
                        </div>
                    </div>
                    <div class="back-card bg-green-900 text-white p-8 flex items-center justify-center text-center">
                        <p>Información del Liquidámbar.</p>
                    </div>
                </div>
            </div>
            <div class="p-4 text-center font-bold text-green-800">Liquidámbar</div>
        </div>

        <div class="photo-card bg-white rounded-xl shadow-xl overflow-hidden" id="card-2">
            <div class="relative cursor-pointer" onclick="this.closest('.photo-card').classList.toggle('flipped')">
                <div class="inner-card">
                    <div class="front-card">
                        <div class="img-container">
                            <img src="img/bosque.jpg" class="preview-img" style="opacity: 1;">
                            <button onclick="event.stopPropagation(); openGallery(2)" class="absolute top-4 right-4 bg-black/60 text-white p-3 rounded-full z-50">🔍</button>
                        </div>
                    </div>
                    <div class="back-card bg-green-900 text-white p-8 flex items-center justify-center">Pino Nacional</div>
                </div>
            </div>
            <div class="p-4 text-center font-bold text-green-800">Pino</div>
        </div>

        <div class="photo-card bg-white rounded-xl shadow-xl overflow-hidden" id="card-3">
            <div class="relative cursor-pointer" onclick="this.closest('.photo-card').classList.toggle('flipped')">
                <div class="inner-card">
                    <div class="front-card">
                        <div class="img-container">
                            <img src="img/montaña.jpg" class="preview-img" style="opacity: 1;">
                            <button onclick="event.stopPropagation(); openGallery(3)" class="absolute top-4 right-4 bg-black/60 text-white p-3 rounded-full z-50">🔍</button>
                        </div>
                    </div>
                    <div class="back-card bg-green-900 text-white p-8 flex items-center justify-center">Montañas de Honduras</div>
                </div>
            </div>
            <div class="p-4 text-center font-bold text-green-800">Montaña</div>
        </div>

    </main>

    <div id="imageModal">
        <span onclick="closeModal()" class="absolute top-5 right-10 text-white text-5xl cursor-pointer hover:text-green-500">&times;</span>
        
        <button id="mPrev" class="modal-nav left-5" onclick="moveModal(-1)">&#10094;</button>
        <img id="fullImage" src="">
        <button id="mNext" class="modal-nav right-5" onclick="moveModal(1)">&#10095;</button>
    </div>

    <script>
        let modalImages = [];
        let modalIdx = 0;

        // 1. CAMBIAR IMAGEN EN LA VISTA PREVIA (CUADRO)
        function switchImg(cardNum, imgIdx) {
            const card = document.getElementById('card-' + cardNum);
            const imgs = card.querySelectorAll('.preview-img');
            const dots = card.querySelectorAll('.no-flip div');

            imgs.forEach((img, i) => {
                img.style.opacity = (i === imgIdx) ? "1" : "0";
                img.style.zIndex = (i === imgIdx) ? "10" : "0";
            });

            dots.forEach((dot, i) => {
                dot.style.backgroundColor = (i === imgIdx) ? "white" : "rgba(255,255,255,0.4)";
            });
        }

        // 2. ABRIR MODO COMPLETO (LUPA)
        function openGallery(cardNum) {
            const card = document.getElementById('card-' + cardNum);
            const imgs = card.querySelectorAll('.preview-img');
            
            // Recoger las rutas
            modalImages = Array.from(imgs).map(i => i.src);
            
            // Ver cuál está visible ahora
            modalIdx = 0;
            imgs.forEach((img, i) => {
                if(img.style.opacity === "1") modalIdx = i;
            });

            // Configurar botones
            document.getElementById('mPrev').style.display = (modalImages.length > 1) ? 'block' : 'none';
            document.getElementById('mNext').style.display = (modalImages.length > 1) ? 'block' : 'none';

            showModalImg();
            document.getElementById('imageModal').style.display = 'flex';
        }

        // 3. NAVEGAR EN EL MODAL
        function moveModal(step) {
            modalIdx += step;
            if(modalIdx < 0) modalIdx = modalImages.length - 1;
            if(modalIdx >= modalImages.length) modalIdx = 0;
            showModalImg();
        }

        function showModalImg() {
            document.getElementById('fullImage').src = modalImages[modalIdx];
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // Teclado
        window.onkeydown = function(e) {
            if(document.getElementById('imageModal').style.display === 'flex') {
                if(e.key === "Escape") closeModal();
                if(e.key === "ArrowLeft") moveModal(-1);
                if(e.key === "ArrowRight") moveModal(1);
            }
        }
    </script>
</body>
</html>
