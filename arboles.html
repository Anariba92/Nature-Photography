<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desarrollo | Álbum Bosques</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .hidden-card { display: none !important; }
        .img-container { height: 380px; overflow: hidden; position: relative; background: #1a1a1a; border-radius: 1rem 1rem 0 0; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; position: absolute; transition: opacity 0.5s ease; opacity: 0; }
        .preview-img.active { opacity: 1; z-index: 10; }
        .photo-card { perspective: 1000px; height: 460px; }
        .inner-card { transition: transform 0.8s; transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
        .flipped .inner-card { transform: rotateY(180deg); }
        .front-card, .back-card { backface-visibility: hidden; position: absolute; inset: 0; border-radius: 1rem; }
        .back-card { transform: rotateY(180deg); background: #064e3b; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
        #imageModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        #fullImage { max-width: 90%; max-height: 80vh; object-fit: contain; }
    </style>
</head>
<body class="bg-stone-100 p-4 pt-48 md:pt-32">

    <script>
        (function() {
            const claveCorrecta = "1234"; // Define tu clave aquí
            if (sessionStorage.getItem("dev_auth") !== "true") {
                const pass = prompt("Contraseña de Desarrollador:");
                if (pass === claveCorrecta) {
                    sessionStorage.setItem("dev_auth", "true");
                } else {
                    document.body.innerHTML = "<div style='text-align:center;margin-top:100px;'><h1>Acceso Restringido</h1><p>Sitio en fase de desarrollo.</p></div>";
                    window.stop();
                }
            }
        })();
    </script>

    <nav class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-md border-b z-[100] p-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-4 items-center justify-between">
            <span class="font-bold text-green-800">MODO DESARROLLO</span>
            <div class="flex flex-wrap gap-2 w-full md:w-auto">
                <input type="text" id="searchInput" oninput="filtrarContenido()" placeholder="Buscar..." class="flex-1 md:w-64 px-4 py-2 rounded-xl border border-stone-300 outline-none">
                <select id="yearFilter" onchange="filtrarContenido()" class="px-4 py-2 rounded-xl border border-stone-300 bg-white outline-none">
                    <option value="all">Todos los años</option>
                </select>
            </div>
        </div>
    </nav>

    <main id="albumGrid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="photo-card" data-name="pino liquidambar" data-year="2026">
            <div class="relative h-full cursor-pointer" onclick="handleFlip(this, event)">
                <div class="inner-card">
                    <div class="front-card bg-white shadow-lg">
                        <div class="img-container">
                            <img src="img/Pino.jpg" class="preview-img active">
                        </div>
                        <div class="p-4 text-center font-bold text-green-900 uppercase">Pino Liquidámbar</div>
                    </div>
                    <div class="back-card">
                        <p>Información en desarrollo...</p>
                        <span class="text-xs mt-4">2026</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Lógica de filtrado corregida para GitHub
        window.addEventListener('load', () => {
            const tarjetas = document.querySelectorAll('.photo-card');
            const select = document.getElementById('yearFilter');
            const anios = new Set();
            tarjetas.forEach(t => { if(t.dataset.year) anios.add(t.dataset.year); });
            Array.from(anios).sort().reverse().forEach(a => {
                const opt = document.createElement('option');
                opt.value = a; opt.textContent = a; select.appendChild(opt);
            });
        });

        function filtrarContenido() {
            const txt = document.getElementById('searchInput').value.toLowerCase();
            const year = document.getElementById('yearFilter').value;
            document.querySelectorAll('.photo-card').forEach(t => {
                const coincideTxt = t.dataset.name.toLowerCase().includes(txt);
                const coincideYear = (year === 'all' || t.dataset.year === year);
                t.classList.toggle('hidden-card', !(coincideTxt && coincideYear));
            });
        }

        function handleFlip(card, e) { card.classList.toggle('flipped'); }
    </script>
</body>
</html>
