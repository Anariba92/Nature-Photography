<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Bosques | Árboles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .img-container { height: 380px; overflow: hidden; position: relative; background: #1a1a1a; border-radius: 1rem 1rem 0 0; }
        .preview-img { 
            width: 100%; height: 100%; object-fit: cover; object-position: center; 
            position: absolute; transition: opacity 0.5s ease; 
            z-index: 0; opacity: 0; 
        }
        .preview-img.active { opacity: 1; z-index: 10; }
        
        .photo-card { perspective: 1000px; height: 460px; transition: transform 0.3s; }
        .inner-card { transition: transform 0.8s; transform-style: preserve-3d; position: relative; width: 100%; height: 100%; }
        .flipped .inner-card { transform: rotateY(180deg); }
        .front-card, .back-card { backface-visibility: hidden; position: absolute; inset: 0; border-radius: 1rem; overflow: hidden; }
        .back-card { 
            transform: rotateY(180deg); background: #064e3b; color: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; 
        }
        
        #imageModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; }
        #fullImage { max-width: 90%; max-height: 75vh; object-fit: contain; cursor: default; }
        
        .hidden-card { display: none !important; }
        .swal2-container { z-index: 10000 !important; }

        /* Botones Navegación Modal */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.2); color: white; border-radius: 50%;
            width: 55px; height: 55px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; transition: all 0.3s; z-index: 100;
        }
        .btn-prev { left: 15px; }
        .btn-next { right: 15px; }

        /* Ajustes para Celular */
        @media (max-width: 768px) {
            .nav-btn { width: 50px; height: 50px; background: rgba(0,0,0,0.5); }
            .img-container { height: 320px; }
            .photo-card { height: 420px; }
        }
    </style>
</head>
