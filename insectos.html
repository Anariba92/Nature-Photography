<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Life Honduras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Contenedor principal con altura automática para que quepa el texto */
        .card-container {
            position: relative;
            background: white;
            border-radius: 1.25rem;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        .card-container:hover {
            transform: translateY(-5px);
        }

        /* Caja de la imagen */
        .img-box {
            width: 100%;
            height: 280px;
            position: relative;
            background: #000;
        }

        .slide-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Botón de Zoom con alta prioridad */
        .btn-zoom {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #16a34a !important;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Pie de página con la información técnica */
        .card-footer {
            padding: 1.25rem;
            background: white;
            border-top: 1px solid #f3f4f6;
        }

        .species-title {
            color: #064e3b;
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .species-desc {
            color: #4b5563;
            font-size: 0.9rem;
            line-height: 1.4;
            font-style: italic;
        }

        /* Modal para pantalla completa */
        #imageModal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            z-index: 10000; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
    </style>
</head>
<body class="bg-stone-100 p-4">

    <nav class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-sm border-b z-[1000] p-4 text-center">
        <h1 class="font-black text-green-900 text-xl tracking-tighter uppercase">Wild Life Honduras</h1>
    </nav>

    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-24">
        
        <div class="card-container">
            <div class="img-box">
                <button class="btn-zoom" onclick="verImagen('img/mariposa1.jpg')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                </button>
                <img src="img/mariposa1.jpg" class="slide-img" alt="Mariposa Malaquita">
            </div>
            
            <div class="card-footer">
                <h2 class="species-title">Mariposa Malaquita</h2>
                <p class="species-desc">"Siproeta stelenes: Muy común en zonas húmedas de Honduras. Destaca por sus colores verdes translúcidos."</p>
            </div>
        </div>

        <div class="card-container">
            <div class="img-box">
                <button class="btn-zoom" onclick="verImagen('img/chinche.jpg')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                </button>
                <img src="img/chinche.jpg" class="slide-img" alt="Chinche de Campo">
            </div>
            
            <div class="card-footer">
                <h2 class="species-title">Chinche de Campo</h2>
                <p class="species-desc">"Hemiptera: Importante controlador biológico de plagas en los ecosistemas locales."</p>
            </div>
        </div>

        </main>

    <div id="imageModal" onclick="this.style.display='none'">
        <img id="modalImg" class="max-w-full max-h-full rounded-lg shadow-2xl">
    </div>

    <script>
        function verImagen(src) {
            const m = document.getElementById('imageModal');
            document.getElementById('modalImg').src = src;
            m.style.display = 'flex';
        }
    </script>
</body>
</html>
